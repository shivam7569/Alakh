name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          # API 37 (Android 17) is a preview platform and the runner's bundled cmdline-tools are too
          # old to parse the current repo (XML v4). Install fresh cmdline-tools, then use the
          # newest sdkmanager (it lands in latest-2 since latest already exists) from the canary channel.
          sdkmanager "cmdline-tools;latest" > /dev/null 2>&1 || true
          SDKM=$(ls -dt "$ANDROID_SDK_ROOT"/cmdline-tools/*/bin/sdkmanager | head -1)
          echo "Using $SDKM"
          yes | "$SDKM" --channel=3 --licenses > /dev/null 2>&1 || true
          "$SDKM" --channel=3 "platforms;android-37" "build-tools;37.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace --console=plain

      - name: Upload test reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/build/reports/tests/**'
          if-no-files-found: ignore
