name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # The app modules use compileSdk 37 (an Android 17 preview platform not published to the
      # public SDK repo), so they can't be built on CI runners. The testable business logic lives
      # in the pure-JVM :core module instead. --configure-on-demand makes Gradle evaluate ONLY
      # :core, so the Android modules are never configured and no Android SDK is required.
      - name: Run unit tests
        run: ./gradlew :core:test --configure-on-demand --stacktrace --console=plain

      - name: Upload test reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/build/reports/tests/**'
          if-no-files-found: ignore
